<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จองคิวณัฏฐ์ดวงดู</title>
    <script src="https://liff.line.me/2010719506-kgaaBnlo"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        .tab-button { padding: 12px 30px; border: none; background: white; color: #667eea; font-size: 1em; font-weight: bold; border-radius: 25px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .tab-button.active { background: #667eea; color: white; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1em; }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        .radio-group { display: flex; gap: 20px; margin-bottom: 20px; }
        .radio-option { display: flex; align-items: center; gap: 10px; }
        .button { padding: 12px 30px; border: none; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-size: 1em; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; width: 100%; }
        .button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4); }
        .button.secondary { background: #f0f0f0; color: #333; }
        .button.danger { background: #ff6b6b; }
        .success-message { background: #4caf50; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .error-message { background: #ff6b6b; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .queue-item { background: #f9f9f9; border-left: 4px solid #667eea; padding: 15px; margin-bottom: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .queue-item.completed { background: #e8f5e9; border-left-color: #4caf50; }
        .queue-info { flex: 1; min-width: 200px; }
        .queue-number { font-size: 1.5em; font-weight: bold; color: #667eea; margin-bottom: 5px; }
        .queue-details { font-size: 0.9em; color: #666; }
        .queue-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .queue-actions button { padding: 8px 15px; font-size: 0.9em; min-width: 100px; }
        .user-profile { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px; }
        .user-profile img { width: 50px; height: 50px; border-radius: 50%; }
        .user-info h3 { margin: 0; color: #333; }
        .user-info p { margin: 5px 0 0 0; color: #666; font-size: 0.9em; }
        .file-input-label { display: block; padding: 12px; background: #f0f0f0; border: 2px dashed #667eea; border-radius: 8px; text-align: center; cursor: pointer; }
        .file-preview { margin-top: 10px; max-width: 200px; border-radius: 8px; }
        .empty-state { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 จองคิวณัฏฐ์ดวงดู</h1>
            <p>ระบบจองคิวออนไลน์</p>
        </header>

        <div id="MainInterface" style="display: none;">
            <div class="card">
                <div class="user-profile">
                    <img id="userPicture" src="" alt="Profile">
                    <div class="user-info">
                        <h3 id="userName">กำลังโหลด...</h3>
                        <p>ยินดีต้อนรับ</p>
                    </div>
                    <button class="button secondary" style="width: auto; margin-left: auto;" onclick="logout()">ออกจากระบบ</button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-button active" onclick="switchTab('booking')">จองคิว</button>
                <button class="tab-button" onclick="switchTab('queue')">ดูคิวปัจจุบัน</button>
                <button class="tab-button" onclick="switchTab('admin')">จัดการคิว (แอดมิน)</button>
            </div>

            <div id="booking" class="tab-content active">
                <div class="card">
                    <h2>เลือกรูปแบบการจองคิว</h2>
                    <div class="success-message" id="bookingSuccess">✓ จองคิวสำเร็จ! ระบบจะส่งแจ้งเตือนไปยัง LINE OA ครับ</div>
                    <div class="error-message" id="bookingError"></div>

                    <div class="form-group">
                        <div class="radio-group">
                            <div class="radio-option">
                                <input type="radio" id="typeWalkin" name="queueType" value="walkin" checked onchange="updateQueueTypeDisplay()">
                                <label for="typeWalkin">จองคิวแบบพิมพ์คุย (ปกติ)</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="typePhone" name="queueType" value="phone" onchange="updateQueueTypeDisplay()">
                                <label for="typePhone">จองคิวแบบโทรคุย (ระบุเวลา)</label>
                            </div>
                        </div>
                    </div>

                    <div id="walkinSection" style="display: block;">
                        <div class="form-group">
                            <label>อัปโหลด Slip เพื่อยืนยันการจอง *</label>
                            <input type="file" id="walkinSlip" accept="image/*" onchange="previewImage('walkinSlip', 'walkinPreview')" style="display:none;">
                            <label for="walkinSlip" class="file-input-label">📸 คลิกเพื่อแนบรูปสลิปโอนเงิน</label>
                            <img id="walkinPreview" class="file-preview" style="display: none;">
                        </div>
                        <button class="button" onclick="bookWalkinQueue()">ยืนยันการจองคิว</button>
                    </div>

                    <div id="phoneSection" style="display: none;">
                        <div class="form-group"><label>เลือกวันนัดหมาย *</label><input type="date" id="phoneDate"></div>
                        <div class="form-group"><label>เลือกเวลานัดหมาย *</label><input type="time" id="phoneTime"></div>
                        <div class="form-group">
                            <label>ระยะเวลาที่ต้องการดูดวง *</label>
                            <select id="phoneDuration">
                                <option value="15">15 นาที</option>
                                <option value="30">30 นาที (ครึ่งชั่วโมง)</option>
                                <option value="60">1 ชั่วโมงเต็ม</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>อัปโหลด Slip เพื่อยืนยันการจอง *</label>
                            <input type="file" id="phoneSlip" accept="image/*" onchange="previewImage('phoneSlip', 'phonePreview')" style="display:none;">
                            <label for="phoneSlip" class="file-input-label">📸 คลิกเพื่อแนบรูปสลิปโอนเงิน</label>
                            <img id="phonePreview" class="file-preview" style="display: none;">
                        </div>
                        <button class="button" onclick="bookPhoneQueue()">ยืนยันการนัดคิวโทร</button>
                    </div>
                </div>
            </div>

            <div id="queue" class="tab-content">
                <div class="card">
                    <h2>รายการคิวปัจจุบัน</h2>
                    <div id="queueList"></div>
                </div>
            </div>

            <div id="admin" class="tab-content">
                <div class="card">
                    <h2>แผงควบคุมระบบจัดการคิว</h2>
                    <div id="adminQueueList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ CONFIGURATION ============
        const API_BASE_URL = 'https://queue-booking.onrender.com'; 
        const LIFF_ID = '2010719506-kgaaBnlo'; 
        
        let currentUser = null;

        // ============ INITIALIZATION ============
        window.addEventListener('load', async () => {
    try {
        await liff.init({ liffId: LIFF_ID });
        
        // ถ้าล็อกอินอยู่แล้ว ให้โหลดหน้าใช้งานปกติ
        if (liff.isLoggedIn()) {
            await handleLineLogin();
        } else {
            // ถ้ายังไม่ได้ล็อกอิน ให้ "บังคับกระโดด" ไปหน้าอนุญาตใช้งานของ LINE ทันที!
            liff.login(); 
        }
    } catch (error) {
        console.error('LIFF Init Error:', error);
        // ถ้ามี error ก็ให้โชว์หน้า Login เผื่อไว้
        showLoginSection();
    }
});

                
                // 🚨 แก้บั๊กหน้าจอว่าง: หากมีอาการ Error ใดๆ ให้ระบบข้ามไปแสดงหน้าจอ Login ทันทีเพื่อปุ่มจะได้ไม่หายไป
                showLoginSection();

                // แสดงแถบช่วยเหลือสีส้มเพื่อแจ้งปัญหาการเชื่อมต่อด้านบนสุด
                const errBanner = document.createElement('div');
                errBanner.style.cssText = 'background: #ff9f43; color: white; padding: 12px; text-align: center; border-radius: 8px; margin-bottom: 20px; font-weight: bold; font-size: 0.9em;';
                errBanner.innerHTML = '⚠️ ระบบ LINE LIFF ทำงานแบบจำกัด (ลองเปิดผ่านแอป LINE ในมือถือเพื่อประสบการณ์ที่ดีที่สุด)';
                const container = document.querySelector('.container');
                if (container) {
                    container.insertBefore(errBanner, container.children[1]); // แทรกไว้ใต้โลโก้หัวข้อหลัก
                }
            }
        });

        async function loginWithLine() {
            if (!liff.isLoggedIn()) { liff.login(); } else { await handleLineLogin(); }
        }

        async function handleLineLogin() {
            try {
                const profile = await liff.getProfile();
                currentUser = { userId: profile.userId, displayName: profile.displayName, pictureUrl: profile.pictureUrl };
                document.getElementById('userName').textContent = currentUser.displayName;
                document.getElementById('userPicture').src = currentUser.pictureUrl;
                showMainInterface();
                loadQueues();
            } catch (error) {
                console.error('Profile Retrieval Error:', error);
                showLoginSection(); // ถ้าดึงข้อมูลประวัติไม่สำเร็จ ให้ดีดกลับมาหน้า Login เพื่อความปลอดภัย
            }
        }

        function logout() { liff.logout(); location.reload(); }
        function showLoginSection() { document.getElementById('loginSection').style.display = 'block'; }
        function showMainInterface() { document.getElementById('loginSection').style.display = 'none'; document.getElementById('mainInterface').style.display = 'block'; }

        // 🚨 แก้บั๊กสลับแท็บพัง: เปลี่ยนวิธีการสลับคลาสแอคทีฟให้ปลอดภัย ไม่พึ่งพาคลาส Event
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            
            // สั่งเปิดแท็บเนื้อหาที่เลือก
            document.getElementById(tabName).classList.add('active');
            
            // วนลูปหาปุ่มสลับแท็บที่มีฟังก์ชันเปิดแท็บนั้นๆ แล้วเปิดใช้งานให้เหมาะสม
            const buttons = document.querySelectorAll('.tab-button');
            buttons.forEach(btn => {
                if (btn.getAttribute('onclick') && btn.getAttribute('onclick').includes(tabName)) {
                    btn.classList.add('active');
                }
            });

            if (tabName === 'queue') loadQueues();
            if (tabName === 'admin') loadAdminQueues();
        }

        function updateQueueTypeDisplay() {
            const type = document.querySelector('input[name="queueType"]:checked').value;
            document.getElementById('walkinSection').style.display = type === 'walkin' ? 'block' : 'none';
            document.getElementById('phoneSection').style.display = type === 'phone' ? 'block' : 'none';
        }

        function previewImage(inputId, previewId) {
            const file = document.getElementById(inputId).files[0];
            const preview = document.getElementById(previewId);
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => { preview.src = e.target.result; preview.style.display = 'block'; };
                reader.readAsDataURL(file);
            }
        }

        // ============ BOOKING FUNCTIONS ============
        async function bookWalkinQueue() {
            try {
                if (!document.getElementById('walkinSlip').files[0]) return alert('กรุณาแนบรูปสลิปโอนเงินก่อนครับ');
                
                const response = await fetch(`${API_BASE_URL}/api/book-queue`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ displayName: currentUser.displayName, userId: currentUser.userId, type: 'walkin' })
                });

                if (!response.ok) throw new Error('เกิดข้อผิดพลาดในการจองคิว');
                alert('จองคิวพิมพ์สำเร็จ!');
                location.reload();
            } catch (error) { alert(error.message); }
        }

        async function bookPhoneQueue() {
            try {
                const date = document.getElementById('phoneDate').value;
                const time = document.getElementById('phoneTime').value;
                const duration = document.getElementById('phoneDuration').value;
                if (!date || !time || !document.getElementById('phoneSlip').files[0]) return alert('กรุณากรอกข้อมูลวัน เวลา และแนบสลิปให้ครบถ้วนครับ');

                const response = await fetch(`${API_BASE_URL}/api/book-queue`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ displayName: currentUser.displayName, userId: currentUser.userId, type: 'phone', scheduledDate: date, scheduledTime: time, duration: duration })
                });

                if (!response.ok) throw new Error('เกิดข้อผิดพลาดในการจองคิว');
                alert('จองคิวนัดโทรสำเร็จ!');
                location.reload();
            } catch (error) { alert(error.message); }
        }

        // ============ QUEUE DISPLAY ============
        async function loadQueues() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/queues`);
                const data = await response.json();
                const queues = data.queues || [];
                const queueList = document.getElementById('queueList');
                if (queues.length === 0) return queueList.innerHTML = '<div class="empty-state">📭 ยังไม่มีการจองคิวในระบบ</div>';

                let html = '';
                queues.forEach(q => {
                    const statusText = q.status === 'waiting' ? '⏳ รอคิว' : q.status === 'called' ? '📢 เรียกแล้ว' : '✅ เสร็จสิ้น';
                    html += `<div class="queue-item">
                        <div class="queue-info">
                            <div class="queue-number">ลำดับคิวที่ ${q.queueNumber}</div>
                            <div class="queue-details">
                                <p>👤 คุณ: ${q.displayName}</p>
                                ${q.type === 'phone' ? `<p>⏰ นัดโทร: ${q.scheduledDate} เวลา ${q.scheduledTime} (${q.duration} นาที)</p>` : '<p>📦 ประเภท: พิมพ์คุยปกติ</p>'}
                                <p>สถานะ: ${statusText}</p>
                            </div>
                        </div>
                    </div>`;
                });
                queueList.innerHTML = html;
            } catch (error) { console.error(error); }
        }

        async function loadAdminQueues() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/queues`);
                const data = await response.json();
                const queues = data.queues || [];
                const adminList = document.getElementById('adminQueueList');
                if (queues.length === 0) return adminList.innerHTML = '<div class="empty-state">📭 ยังไม่มีคิวให้จัดการ</div>';

                let html = '';
                queues.forEach(q => {
                    if (q.status !== 'completed') {
                        html += `<div class="queue-item">
                            <div class="queue-info">
                                <div class="queue-number">ลำดับที่ ${q.queueNumber} [${q.status === 'called' ? 'เรียกแล้ว' : 'รอรับการเรียก'}]</div>
                                <p>👤 ชื่อลูกค้า: ${q.displayName}</p>
                                ${q.type === 'phone' ? `<p>⏰ นัดหมาย: ${q.scheduledDate} | ${q.scheduledTime}</p>` : ''}
                                <p>📸 สถานะสลิป: ลูกค้าแนบเรียบร้อยแล้ว</p>
                            </div>
                            <div class="queue-actions">
                                <button class="button" onclick="callQueue(${q.id})">📢 เรียกคิว</button>
                                <button class="button danger" onclick="completeQueue(${q.id})">✅ ปิดคิว</button>
                            </div>
                        </div>`;
                    }
                });
                adminList.innerHTML = html || '<div class="empty-state">✅ เคลียร์คิวทั้งหมดเสร็จสิ้นแล้ว</div>';
            } catch (error) { console.error(error); }
        }

        async function callQueue(id) {
            if (!confirm('ยืนยันที่จะเรียกคิวนี้ใช่ไหม?')) return;
            await fetch(`${API_BASE_URL}/api/call-queue/${id}`, { method: 'POST' });
            alert('เรียกคิวสำเร็จ ข้อความยิงแจ้งเตือนแล้วครับ');
            loadAdminQueues();
        }

        async function completeQueue(id) {
            if (!confirm('ยืนยันที่จะปิดงานคิวนี้ใช่ไหม?')) return;
            await fetch(`${API_BASE_URL}/api/complete-queue/${id}`, { method: 'POST' });
            alert('ปิดงานคิวเสร็จสิ้น ขอบคุณครับ');
            loadAdminQueues();
        }
    </script>
</body>
</html>
