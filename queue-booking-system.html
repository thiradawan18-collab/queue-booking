<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จองคิวณัฏฐ์ดวงดู</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tab-button {
            padding: 12px 30px;
            border: none;
            background: white;
            color: #667eea;
            font-size: 1em;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .tab-button.active {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .tab-button:hover {
            transform: translateY(-2px);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .radio-option input[type="radio"] {
            width: auto;
            cursor: pointer;
        }

        .button {
            padding: 12px 30px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: #f0f0f0;
            color: #333;
        }

        .button.danger {
            background: #ff6b6b;
        }

        .success-message {
            background: #4caf50;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .queue-item {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .queue-item.completed {
            background: #e8f5e9;
            border-left-color: #4caf50;
        }

        .queue-info {
            flex: 1;
            min-width: 200px;
        }

        .queue-number {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .queue-details {
            font-size: 0.9em;
            color: #666;
        }

        .queue-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .queue-actions button {
            padding: 8px 15px;
            font-size: 0.9em;
            min-width: 100px;
        }

        .settings-section {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .settings-section h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .queue-type-section {
            display: none;
        }

        .queue-type-section.active {
            display: block;
        }

        .datetime-input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .tabs {
                flex-direction: column;
            }

            .tab-button {
                width: 100%;
            }

            .card {
                padding: 20px;
            }

            .queue-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .queue-actions {
                width: 100%;
            }

            .queue-actions button {
                flex: 1;
            }

            .datetime-input-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 จองคิวณัฏฐ์ดวงดู</h1>
            <p>ระบบจองคิวออนไลน์</p>
        </header>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('booking')">จองคิว</button>
            <button class="tab-button" onclick="switchTab('queue')">ดูคิว</button>
            <button class="tab-button" onclick="switchTab('admin')">จัดการคิว</button>
            <button class="tab-button" onclick="switchTab('settings')">ตั้งค่า</button>
        </div>

        <!-- TAB: BOOKING -->
        <div id="booking" class="tab-content active">
            <div class="card">
                <h2>จองคิว</h2>
                <div class="success-message" id="bookingSuccess">✓ จองคิวสำเร็จ! ระบบจะส่งแจ้งเตือนไปยัง LINE ของคุณ</div>
                <div class="error-message" id="bookingError"></div>

                <div class="form-group">
                    <label>เลือกประเภทการจอง</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="typeWalkin" name="queueType" value="walkin" checked onchange="updateQueueTypeDisplay()">
                            <label for="typeWalkin">จองคิวแบบพิมพ์ (ปกติ)</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="typePhone" name="queueType" value="phone" onchange="updateQueueTypeDisplay()">
                            <label for="typePhone">จองคิวแบบโทร (ระบุวัน/เวลา)</label>
                        </div>
                    </div>
                </div>

                <div id="walkinSection" class="queue-type-section active">
                    <div class="form-group">
                        <label for="walkinName">ชื่อบัญชี LINE *</label>
                        <input type="text" id="walkinName" placeholder="กรุณาใส่ชื่อบัญชี LINE ของคุณ" required>
                    </div>
                    <button class="button" onclick="bookWalkinQueue()">จองคิวเลย</button>
                </div>

                <div id="phoneSection" class="queue-type-section">
                    <div class="form-group">
                        <label for="phoneName">ชื่อบัญชี LINE *</label>
                        <input type="text" id="phoneName" placeholder="กรุณาใส่ชื่อบัญชี LINE ของคุณ" required>
                    </div>
                    <div class="form-group">
                        <label>เลือกวันและเวลา</label>
                        <div class="datetime-input-group">
                            <div>
                                <label for="phoneDate" style="font-size: 0.9em;">วันที่ *</label>
                                <input type="date" id="phoneDate" required>
                            </div>
                            <div>
                                <label for="phoneTime" style="font-size: 0.9em;">เวลา *</label>
                                <input type="time" id="phoneTime" required>
                            </div>
                        </div>
                    </div>
                    <button class="button" onclick="bookPhoneQueue()">จองคิวเลย</button>
                </div>
            </div>
        </div>

        <!-- TAB: QUEUE -->
        <div id="queue" class="tab-content">
            <div class="card">
                <h2>รายการคิวปัจจุบัน</h2>
                <div id="queueList"></div>
            </div>
        </div>

        <!-- TAB: ADMIN -->
        <div id="admin" class="tab-content">
            <div class="card">
                <h2>จัดการคิว (สำหรับเจ้าของ)</h2>
                <div class="settings-section">
                    <h3>🔐 ตั้งรหัสผ่าน</h3>
                    <div class="form-group">
                        <label for="adminPassword">ตั้งรหัสผ่านสำหรับเข้าจัดการคิว</label>
                        <input type="password" id="adminPassword" placeholder="ตั้งรหัสผ่าน">
                        <button class="button" style="margin-top: 10px;" onclick="setAdminPassword()">บันทึกรหัสผ่าน</button>
                    </div>
                </div>

                <div id="adminPanel" style="display: none;">
                    <div class="settings-section">
                        <h3>ลำดับคิว</h3>
                        <div id="adminQueueList"></div>
                    </div>
                </div>

                <div id="adminLoginForm">
                    <div class="form-group">
                        <label for="adminLoginPassword">กรุณาใส่รหัสผ่านเพื่อเข้าจัดการคิว</label>
                        <input type="password" id="adminLoginPassword" placeholder="ใส่รหัสผ่าน">
                        <button class="button" style="margin-top: 10px;" onclick="adminLogin()">เข้าสู่ระบบ</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- TAB: SETTINGS -->
        <div id="settings" class="tab-content">
            <div class="card">
                <h2>⚙️ ตั้งค่า LINE Messaging API</h2>
                <div class="form-group">
                    <label for="lineChannelSecret">Channel Secret</label>
                    <input type="password" id="lineChannelSecret" placeholder="ใส่ Channel Secret ของคุณ">
                </div>
                <div class="form-group">
                    <label for="lineAccessToken">Channel Access Token</label>
                    <textarea id="lineAccessToken" placeholder="ใส่ Channel Access Token ของคุณ" rows="4"></textarea>
                </div>
                <button class="button" onclick="saveLineSettings()">บันทึกการตั้งค่า</button>
                <div class="success-message" id="settingsSuccess">✓ บันทึกการตั้งค่าสำเร็จ</div>

                <div class="settings-section" style="margin-top: 30px;">
                    <h3>📊 สถิติ</h3>
                    <p>จำนวนคิวทั้งหมด: <strong id="totalQueues">0</strong></p>
                    <p>คิวที่เสร็จสิ้น: <strong id="completedQueues">0</strong></p>
                    <p>คิวที่รอ: <strong id="pendingQueues">0</strong></p>
                    <button class="button secondary" style="margin-top: 15px;" onclick="clearAllData()">ลบข้อมูลทั้งหมด</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ STORAGE MANAGEMENT ============
        const STORAGE_KEYS = {
            QUEUES: 'queue_booking_queues',
            LINE_SETTINGS: 'queue_booking_line_settings',
            ADMIN_PASSWORD: 'queue_booking_admin_password'
        };

        function getQueues() {
            const data = localStorage.getItem(STORAGE_KEYS.QUEUES);
            return data ? JSON.parse(data) : [];
        }

        function saveQueues(queues) {
            localStorage.setItem(STORAGE_KEYS.QUEUES, JSON.stringify(queues));
            updateQueueDisplay();
            updateStats();
        }

        function getLineSettings() {
            const data = localStorage.getItem(STORAGE_KEYS.LINE_SETTINGS);
            return data ? JSON.parse(data) : { channelSecret: '', accessToken: '' };
        }

        function saveLineSettings() {
            const secret = document.getElementById('lineChannelSecret').value;
            const token = document.getElementById('lineAccessToken').value;
            
            if (!secret || !token) {
                alert('กรุณาใส่ Channel Secret และ Channel Access Token');
                return;
            }

            localStorage.setItem(STORAGE_KEYS.LINE_SETTINGS, JSON.stringify({
                channelSecret: secret,
                accessToken: token
            }));

            document.getElementById('settingsSuccess').style.display = 'block';
            setTimeout(() => {
                document.getElementById('settingsSuccess').style.display = 'none';
            }, 3000);
        }

        // ============ TAB NAVIGATION ============
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });

            // Remove active class from all buttons
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');

            // Add active class to clicked button
            event.target.classList.add('active');

            // Update displays
            if (tabName === 'queue') {
                updateQueueDisplay();
            } else if (tabName === 'admin') {
                checkAdminAccess();
            } else if (tabName === 'settings') {
                loadLineSettings();
                updateStats();
            }
        }

        // ============ QUEUE TYPE DISPLAY ============
        function updateQueueTypeDisplay() {
            const type = document.querySelector('input[name="queueType"]:checked').value;
            
            if (type === 'walkin') {
                document.getElementById('walkinSection').classList.add('active');
                document.getElementById('phoneSection').classList.remove('active');
            } else {
                document.getElementById('walkinSection').classList.remove('active');
                document.getElementById('phoneSection').classList.add('active');
            }
        }

        // ============ BOOKING FUNCTIONS ============
        function bookWalkinQueue() {
            const name = document.getElementById('walkinName').value.trim();
            
            if (!name) {
                showError('bookingError', 'กรุณาใส่ชื่อบัญชี LINE');
                return;
            }

            const queues = getQueues();
            const newQueue = {
                id: Date.now(),
                type: 'walkin',
                name: name,
                bookingTime: new Date().toLocaleString('th-TH'),
                scheduledTime: null,
                status: 'waiting', // waiting, called, completed
                queueNumber: queues.length + 1
            };

            queues.push(newQueue);
            saveQueues(queues);

            // Send LINE notification
            sendLineNotification(`🎫 มีการจองคิวใหม่\nชื่อ: ${name}\nประเภท: พิมพ์\nลำดับที่: ${newQueue.queueNumber}`);

            // Clear form
            document.getElementById('walkinName').value = '';
            document.getElementById('bookingSuccess').style.display = 'block';
            setTimeout(() => {
                document.getElementById('bookingSuccess').style.display = 'none';
            }, 3000);
        }

        function bookPhoneQueue() {
            const name = document.getElementById('phoneName').value.trim();
            const date = document.getElementById('phoneDate').value;
            const time = document.getElementById('phoneTime').value;

            if (!name || !date || !time) {
                showError('bookingError', 'กรุณากรอกข้อมูลให้ครบถ้วน');
                return;
            }

            const queues = getQueues();
            const newQueue = {
                id: Date.now(),
                type: 'phone',
                name: name,
                bookingTime: new Date().toLocaleString('th-TH'),
                scheduledTime: `${date} ${time}`,
                status: 'waiting',
                queueNumber: queues.length + 1
            };

            queues.push(newQueue);
            saveQueues(queues);

            // Send LINE notification
            sendLineNotification(`🎫 มีการจองคิวแบบโทรใหม่\nชื่อ: ${name}\nวันเวลา: ${date} ${time}\nลำดับที่: ${newQueue.queueNumber}`);

            // Clear form
            document.getElementById('phoneName').value = '';
            document.getElementById('phoneDate').value = '';
            document.getElementById('phoneTime').value = '';
            document.getElementById('bookingSuccess').style.display = 'block';
            setTimeout(() => {
                document.getElementById('bookingSuccess').style.display = 'none';
            }, 3000);
        }

        // ============ LINE NOTIFICATION ============
        async function sendLineNotification(message) {
            const settings = getLineSettings();
            
            if (!settings.accessToken) {
                console.log('LINE Token not configured. Message:', message);
                return;
            }

            try {
                // Note: This requires a backend server to handle LINE API calls
                // For now, we'll just log it
                console.log('Sending to LINE:', message);
                
                // You would need to call your backend API here
                // Example: await fetch('/api/send-line-message', { method: 'POST', body: JSON.stringify({ message }) })
            } catch (error) {
                console.error('Error sending LINE notification:', error);
            }
        }

        // ============ QUEUE DISPLAY ============
        function updateQueueDisplay() {
            const queues = getQueues();
            const queueList = document.getElementById('queueList');
            const adminQueueList = document.getElementById('adminQueueList');

            if (queues.length === 0) {
                queueList.innerHTML = '<div class="empty-state">📭 ยังไม่มีคิว</div>';
                if (adminQueueList) {
                    adminQueueList.innerHTML = '<div class="empty-state">📭 ยังไม่มีคิว</div>';
                }
                return;
            }

            // Sort by queue number
            queues.sort((a, b) => a.queueNumber - b.queueNumber);

            let html = '';
            queues.forEach((queue, index) => {
                const isCompleted = queue.status === 'completed';
                const isCalled = queue.status === 'called';
                
                html += `
                    <div class="queue-item ${isCompleted ? 'completed' : ''}">
                        <div class="queue-info">
                            <div class="queue-number">ลำดับที่ ${queue.queueNumber}</div>
                            <div class="queue-details">
                                <p>👤 ${queue.name}</p>
                                <p>📅 ${queue.bookingTime}</p>
                                ${queue.type === 'phone' ? `<p>⏰ นัดหมาย: ${queue.scheduledTime}</p>` : ''}
                                <p>สถานะ: ${getStatusText(queue.status)}</p>
                            </div>
                        </div>
                    </div>
                `;
            });

            queueList.innerHTML = html;
            if (adminQueueList) {
                adminQueueList.innerHTML = html + getAdminActions(queues);
            }
        }

        function getStatusText(status) {
            const statuses = {
                'waiting': '⏳ รอคิว',
                'called': '📢 เรียกแล้ว',
                'completed': '✅ เสร็จสิ้น'
            };
            return statuses[status] || status;
        }

        function getAdminActions(queues) {
            let html = '<div style="margin-top: 20px;">';
            
            queues.forEach((queue) => {
                if (queue.status !== 'completed') {
                    html += `
                        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                            <button class="button" style="flex: 1; padding: 8px;" onclick="callQueue(${queue.id})">
                                📢 เรียกคิว
                            </button>
                            <button class="button danger" style="flex: 1; padding: 8px;" onclick="completeQueue(${queue.id})">
                                ✅ ปิดคิว
                            </button>
                        </div>
                    `;
                }
            });

            html += '</div>';
            return html;
        }

        function callQueue(queueId) {
            const queues = getQueues();
            const queue = queues.find(q => q.id === queueId);
            
            if (queue) {
                queue.status = 'called';
                saveQueues(queues);
                
                // Send LINE notification
                sendLineNotification(`📢 เรียกคิวของคุณแล้ว!\nชื่อ: ${queue.name}\nลำดับที่: ${queue.queueNumber}\nกรุณามาถึงจุดบริการ`);
                
                alert(`เรียกคิวของ ${queue.name} แล้ว`);
            }
        }

        function completeQueue(queueId) {
            const queues = getQueues();
            const queue = queues.find(q => q.id === queueId);
            
            if (queue) {
                queue.status = 'completed';
                saveQueues(queues);
                
                // Send LINE notification
                sendLineNotification(`✅ คิวของคุณเสร็จสิ้นแล้ว\nชื่อ: ${queue.name}\nลำดับที่: ${queue.queueNumber}\nขอบคุณที่ใช้บริการ`);
                
                alert(`ปิดคิวของ ${queue.name} แล้ว`);
            }
        }

        // ============ ADMIN FUNCTIONS ============
        function setAdminPassword() {
            const password = document.getElementById('adminPassword').value.trim();
            
            if (!password) {
                alert('กรุณาตั้งรหัสผ่าน');
                return;
            }

            localStorage.setItem(STORAGE_KEYS.ADMIN_PASSWORD, password);
            alert('ตั้งรหัสผ่านสำเร็จ');
            document.getElementById('adminPassword').value = '';
        }

        function adminLogin() {
            const inputPassword = document.getElementById('adminLoginPassword').value;
            const savedPassword = localStorage.getItem(STORAGE_KEYS.ADMIN_PASSWORD);

            if (!savedPassword) {
                alert('ยังไม่ได้ตั้งรหัสผ่าน กรุณาไปที่แท็บ "ตั้งค่า" เพื่อตั้งรหัสผ่านก่อน');
                return;
            }

            if (inputPassword === savedPassword) {
                document.getElementById('adminLoginForm').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                updateQueueDisplay();
            } else {
                alert('รหัสผ่านไม่ถูกต้อง');
            }
        }

        function checkAdminAccess() {
            const savedPassword = localStorage.getItem(STORAGE_KEYS.ADMIN_PASSWORD);
            
            if (savedPassword) {
                document.getElementById('adminLoginForm').style.display = 'block';
                document.getElementById('adminPanel').style.display = 'none';
            } else {
                document.getElementById('adminLoginForm').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
            }
        }

        // ============ SETTINGS FUNCTIONS ============
        function loadLineSettings() {
            const settings = getLineSettings();
            document.getElementById('lineChannelSecret').value = settings.channelSecret || '';
            document.getElementById('lineAccessToken').value = settings.accessToken || '';
        }

        function updateStats() {
            const queues = getQueues();
            const completed = queues.filter(q => q.status === 'completed').length;
            const pending = queues.filter(q => q.status !== 'completed').length;

            document.getElementById('totalQueues').textContent = queues.length;
            document.getElementById('completedQueues').textContent = completed;
            document.getElementById('pendingQueues').textContent = pending;
        }

        function clearAllData() {
            if (confirm('คุณแน่ใจหรือไม่ที่ต้องการลบข้อมูลทั้งหมด? การกระทำนี้ไม่สามารถยกเลิกได้')) {
                localStorage.removeItem(STORAGE_KEYS.QUEUES);
                updateQueueDisplay();
                updateStats();
                alert('ลบข้อมูลสำเร็จ');
            }
        }

        // ============ ERROR HANDLING ============
        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.style.display = 'block';
            setTimeout(() => {
                element.style.display = 'none';
            }, 3000);
        }

        // ============ INITIALIZATION ============
        window.addEventListener('load', () => {
            updateStats();
            loadLineSettings();
        });
    </script>
</body>
</html>
