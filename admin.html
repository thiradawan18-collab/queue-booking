<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการคิว - แผงควบคุมแอดมิน</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        .card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .button { padding: 10px 20px; border: none; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .button.success { background: #4caf50; }
        .button.danger { background: #ff6b6b; }
        .button.secondary { background: #f0f0f0; color: #333; }
        .queue-item { background: #f9f9f9; border-left: 4px solid #667eea; padding: 20px; margin-bottom: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .queue-item.called { background: #fff3e0; border-left-color: #ff9800; }
        .queue-item.completed { background: #e8f5e9; border-left-color: #4caf50; }
        .queue-number { font-size: 1.8em; font-weight: bold; color: #667eea; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-box { background: rgba(255,255,255,0.2); color: white; padding: 20px; border-radius: 8px; text-align: center; border: 1px solid rgba(255,255,255,0.3); }
        .stat-number { font-size: 2.5em; font-weight: bold; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; margin: 10% auto; padding: 20px; border-radius: 10px; max-width: 500px; text-align: center; }
        .modal-image { width: 100%; max-height: 400px; object-fit: contain; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔮 แผงจัดการคิว: ณัฏฐ์ดวงดู</h1>
            <p style="color: white; opacity: 0.8;">ระบบควบคุมสำหรับเจ้าของห้องทำนาย</p>
        </header>

        <div class="stats">
            <div class="stat-box"><div class="stat-number" id="countWaiting">0</div><div>รอคิว</div></div>
            <div class="stat-box"><div class="stat-number" id="countCalled">0</div><div>เรียกแล้ว</div></div>
            <div class="stat-box"><div class="stat-number" id="countCompleted">0</div><div>เสร็จสิ้น</div></div>
        </div>

        <div class="card">
            <h2>📋 คิวที่กำลังดำเนินการ</h2>
            <div id="activeQueueList" style="margin-top:20px;"></div>
        </div>

        <div class="card">
            <h2>✅ ประวัติคิวที่เสร็จสิ้นแล้ว</h2>
            <div id="completedQueueList" style="margin-top:20px;"></div>
        </div>
    </div>

    <div id="slipModal" class="modal">
        <div class="modal-content">
            <h3>📸 ตรวจสอบสลิปโอนเงิน</h3>
            <img id="slipImage" class="modal-image" src="" alt="Slip" style="margin: 15px 0;">
            <button class="button secondary" onclick="closeSlipModal()">ปิดหน้าต่าง</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = '';

        window.addEventListener('load', () => {
            loadAdminQueues();
            setInterval(loadAdminQueues, 5000); // รีเฟรชข้อมูลคิวอัตโนมัติทุกๆ 5 วินาที
        });

        async function loadAdminQueues() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/queues`);
                const data = await response.json();
                const queues = data.queues || [];

                // อัปเดตตัวเลขสถิติ
                document.getElementById('countWaiting').textContent = queues.filter(q => q.status === 'waiting').length;
                document.getElementById('countCalled').textContent = queues.filter(q => q.status === 'called').length;
                document.getElementById('countCompleted').textContent = queues.filter(q => q.status === 'completed').length;

                const activeList = document.getElementById('activeQueueList');
                const completedList = document.getElementById('completedQueueList');
                
                let activeHtml = '';
                let completedHtml = '';

                queues.forEach(q => {
                    const itemHtml = `
                        <div class="queue-item ${q.status}">
                            <div>
                                <div class="queue-number">ลำดับที่ ${q.queueNumber}</div>
                                <p>👤 <b>ลูกค้า:</b> ${q.displayName}</p>
                                <p>📅 <b>เวลาจอง:</b> ${new Date(q.bookingTime).toLocaleTimeString('th-TH')}</p>
                                ${q.type === 'phone' ? `<p>⏰ <b>นัดหมาย:</b> วันที่ ${q.scheduledDate} เวลา ${q.scheduledTime} (${q.duration} นาที)</p>` : '<p>📋 <b>ประเภท:</b> ดูแบบพิมพ์ถามตอบ</p>'}
                            </div>
                            <div style="display:flex; gap:10px; align-items:center;">
                                <button class="button secondary" onclick="viewSlip('${q.slipUrl}')">📸 ดูสลิป</button>
                                ${q.status === 'waiting' ? `<button class="button success" onclick="callQueue(${q.id})">📢 เรียกคิว</button>` : ''}
                                ${q.status === 'called' ? `<button class="button danger" onclick="completeQueue(${q.id})">✅ ปิดคิว</button>` : ''}
                            </div>
                        </div>`;
                    
                    if(q.status === 'completed') { completedHtml += itemHtml; } else { activeHtml += itemHtml; }
                });

                activeList.innerHTML = activeHtml || '<p style="color:#999;">ไม่มีคิวค้างในระบบ</p>';
                completedList.innerHTML = completedHtml || '<p style="color:#999;">ยังไม่มีประวัติคิวเสร็จสิ้นในวันนี้</p>';
            } catch (e) { console.error(e); }
        }

        async function callQueue(id) {
            if(await fetch(`${API_BASE_URL}/api/call-queue/${id}`, { method: 'POST' })) loadAdminQueues();
        }

        async function completeQueue(id) {
            if(confirm('ยืนยันปิดคิวการทำนายนี้?') && await fetch(`${API_BASE_URL}/api/complete-queue/${id}`, { method: 'POST' })) loadAdminQueues();
        }

        function viewSlip(url) {
            document.getElementById('slipImage').src = url;
            document.getElementById('slipModal').style.display = 'block';
        }
        function closeSlipModal() { document.getElementById('slipModal').style.display = 'none'; }
    </script>
</body>
</html>
