<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จองคิวณัฏฐ์ดวงดู</title>
    <script src="https://d.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        .tab-button { padding: 12px 30px; border: none; background: white; color: #667eea; font-size: 1em; font-weight: bold; border-radius: 25px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .tab-button.active { background: #667eea; color: white; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1em; }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        .radio-group { display: flex; gap: 20px; margin-bottom: 20px; }
        .radio-option { display: flex; align-items: center; gap: 10px; }
        .radio-option input[type="radio"] { width: auto; cursor: pointer; }
        .button { padding: 12px 30px; border: none; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-size: 1em; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; width: 100%; }
        .button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4); }
        .button.secondary { background: #f0f0f0; color: #333; }
        .success-message, .error-message { color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .success-message { background: #4caf50; }
        .error-message { background: #ff6b6b; }
        .queue-item { background: #f9f9f9; border-left: 4px solid #667eea; padding: 15px; margin-bottom: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .queue-item.completed { background: #e8f5e9; border-left-color: #4caf50; }
        .queue-number { font-size: 1.5em; font-weight: bold; color: #667eea; }
        .queue-details { font-size: 0.9em; color: #666; }
        .user-profile { display: flex; align-items: center; gap: 15px; padding: 15px; background: #f9f9f9; border-radius: 8px; }
        .user-profile img { width: 50px; height: 50px; border-radius: 50%; }
        .file-input-label { display: block; padding: 12px; background: #f0f0f0; border: 2px dashed #667eea; border-radius: 8px; text-align: center; cursor: pointer; }
        .file-preview { margin-top: 10px; max-width: 200px; border-radius: 8px; }
        .empty-state { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 จองคิวณัฏฐ์ดวงดู</h1>
            <p>ระบบจองคิวออนไลน์</p>
        </header>

        <div id="loginSection" class="card">
            <h2>🔐 เข้าสู่ระบบด้วย LINE</h2>
            <p style="margin-bottom: 20px; color: #666;">กรุณาเข้าสู่ระบบด้วยบัญชี LINE เพื่อจองคิว</p>
            <button class="button" onclick="loginWithLine()">🔗 เข้าสู่ระบบด้วย LINE</button>
        </div>

        <div id="mainInterface" style="display: none;">
            <div class="card">
                <div class="user-profile">
                    <img id="userPicture" src="" alt="Profile">
                    <div class="user-info">
                        <h3 id="userName">Loading...</h3>
                        <p>ยินดีต้อนรับ</p>
                    </div>
                    <button class="button secondary" style="width: auto; margin-left: auto;" onclick="logout()">ออกจากระบบ</button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-button active" onclick="switchTab('booking')">จองคิว</button>
                <button class="tab-button" onclick="switchTab('queue')">ดูคิวทั้งหมด</button>
            </div>

            <div id="booking" class="tab-content active">
                <div class="card">
                    <h2>กรอกข้อมูลจองคิว</h2>
                    <div class="success-message" id="bookingSuccess">✓ จองคิวสำเร็จ! ตรวจสอบสถานะการเรียกคิวที่หน้าแชต LINE</div>
                    <div class="error-message" id="bookingError"></div>

                    <div class="form-group">
                        <label>เลือกประเภทการจอง</label>
                        <div class="radio-group">
                            <div class="radio-option">
                                <input type="radio" id="typeWalkin" name="queueType" value="walkin" checked onchange="updateQueueTypeDisplay()">
                                <label for="typeWalkin">จองคิวแบบพิมพ์ (ปกติ)</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="typePhone" name="queueType" value="phone" onchange="updateQueueTypeDisplay()">
                                <label for="typePhone">จองคิวแบบโทร (ระบุวัน/เวลา)</label>
                            </div>
                        </div>
                    </div>

                    <div id="walkinSection" class="queue-type-section" style="display: block;">
                        <div class="form-group">
                            <label>อัปโหลด Slip เพื่อยืนยันการจอง *</label>
                            <input type="file" id="walkinSlip" accept="image/*" style="display:none;" onchange="previewImage('walkinSlip', 'walkinPreview')">
                            <label for="walkinSlip" class="file-input-label">📸 คลิกเพื่อแนบรูปสลิปโอนเงิน</label>
                            <img id="walkinPreview" class="file-preview" style="display: none;">
                        </div>
                        <button class="button" onclick="bookWalkinQueue()">ส่งข้อมูลจองคิว</button>
                    </div>

                    <div id="phoneSection" class="queue-type-section" style="display: none;">
                        <div class="form-group">
                            <label for="phoneDate">เลือกวันนัดหมาย *</label>
                            <input type="date" id="phoneDate">
                        </div>
                        <div class="form-group">
                            <label for="phoneTime">เลือกเวลานัดหมาย *</label>
                            <input type="time" id="phoneTime">
                        </div>
                        <div class="form-group">
                            <label for="phoneDuration">ระยะเวลาที่ต้องการ *</label>
                            <select id="phoneDuration">
                                <option value="">-- เลือกระยะเวลา --</option>
                                <option value="15">15 นาที</option>
                                <option value="30">30 นาที</option>
                                <option value="60">1 ชั่วโมง</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>อัปโหลด Slip เพื่อยืนยันการจอง *</label>
                            <input type="file" id="phoneSlip" accept="image/*" style="display:none;" onchange="previewImage('phoneSlip', 'phonePreview')">
                            <label for="phoneSlip" class="file-input-label">📸 คลิกเพื่อแนบรูปสลิปโอนเงิน</label>
                            <img id="phonePreview" class="file-preview" style="display: none;">
                        </div>
                        <button class="button" onclick="bookPhoneQueue()">ส่งข้อมูลจองคิวโทร</button>
                    </div>
                </div>
            </div>

            <div id="queue" class="tab-content">
                <div class="card">
                    <h2>รายการคิวปัจจุบัน</h2>
                    <div id="queueList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ใช้เป็นค่าว่างเปล่า ระบบจะเรียกหา API ตามโดเมนเว็บจริงบน Render ให้อัตโนมัติครับ
        const API_BASE_URL = ''; 
        const LIFF_ID = '2010715428'; 
        let currentUser = null;

        window.addEventListener('load', async () => {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    await handleLineLogin();
                } else {
                    showLoginSection();
                }
            } catch (error) {
                console.error(error);
            }
        });

        async function loginWithLine() {
            if (!liff.isLoggedIn()) { liff.login(); } else { await handleLineLogin(); }
        }

        async function handleLineLogin() {
            const profile = await liff.getProfile();
            currentUser = {
                userId: profile.userId,
                displayName: profile.displayName,
                pictureUrl: profile.pictureUrl
            };
            document.getElementById('userName').textContent = currentUser.displayName;
            document.getElementById('userPicture').src = currentUser.pictureUrl;
            showMainInterface();
            loadQueues();
        }

        function logout() { liff.logout(); location.reload(); }
        function showLoginSection() { document.getElementById('loginSection').style.display = 'block'; }
        function showMainInterface() { document.getElementById('loginSection').style.display = 'none'; document.getElementById('mainInterface').style.display = 'block'; }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            if (tabName === 'queue') loadQueues();
        }

        function updateQueueTypeDisplay() {
            const type = document.querySelector('input[name="queueType"]:checked').value;
            document.getElementById('walkinSection').style.display = type === 'walkin' ? 'block' : 'none';
            document.getElementById('phoneSection').style.display = type === 'phone' ? 'block' : 'none';
        }

        function previewImage(inputId, previewId) {
            const file = document.getElementById(inputId).files[0];
            const preview = document.getElementById(previewId);
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => { preview.src = e.target.result; preview.style.display = 'block'; };
                reader.readAsDataURL(file);
            }
        }

        async function bookWalkinQueue() {
            try {
                const slipFile = document.getElementById('walkinSlip').files[0];
                if (!slipFile) return alert('กรุณาแนบรูปสลิป');

                const formData = new FormData();
                formData.append('type', 'walkin');
                formData.append('slip', slipFile);
                formData.append('displayName', currentUser.displayName);
                formData.append('userId', currentUser.userId);
                formData.append('pictureUrl', currentUser.pictureUrl);

                const response = await fetch(`${API_BASE_URL}/api/book-queue`, { method: 'POST', body: formData });
                if (!response.ok) throw new Error('เกิดข้อผิดพลาดในการส่งคิว');

                document.getElementById('bookingSuccess').style.display = 'block';
                setTimeout(() => { document.getElementById('bookingSuccess').style.display = 'none'; switchTab('queue'); }, 2000);
            } catch (error) { alert(error.message); }
        }

        async function bookPhoneQueue() {
            try {
                const date = document.getElementById('phoneDate').value;
                const time = document.getElementById('phoneTime').value;
                const duration = document.getElementById('phoneDuration').value;
                const slipFile = document.getElementById('phoneSlip').files[0];

                if (!date || !time || !duration || !slipFile) return alert('กรุณากรอกข้อมูลและแนบสลิปให้ครบถ้วน');

                const formData = new FormData();
                formData.append('type', 'phone');
                formData.append('scheduledDate', date);
                formData.append('scheduledTime', time);
                formData.append('duration', duration);
                formData.append('slip', slipFile);
                formData.append('displayName', currentUser.displayName);
                formData.append('userId', currentUser.userId);
                formData.append('pictureUrl', currentUser.pictureUrl);

                const response = await fetch(`${API_BASE_URL}/api/book-queue`, { method: 'POST', body: formData });
                if (!response.ok) throw new Error('เกิดข้อผิดพลาดในการส่งคิว');

                document.getElementById('bookingSuccess').style.display = 'block';
                setTimeout(() => { document.getElementById('bookingSuccess').style.display = 'none'; switchTab('queue'); }, 2000);
            } catch (error) { alert(error.message); }
        }

        async function loadQueues() {
            const response = await fetch(`${API_BASE_URL}/api/queues`);
            const data = await response.json();
            const queueList = document.getElementById('queueList');
            if(data.queues.length === 0) { queueList.innerHTML = '<div class="empty-state">📭 ยังไม่มีคิวในระบบ</div>'; return; }
            
            let html = '';
            data.queues.forEach(q => {
                html += `
                    <div class="queue-item ${q.status === 'completed' ? 'completed' : ''}">
                        <div>
                            <div class="queue-number">คิวที่ ${q.queueNumber}</div>
                            <div class="queue-details">
                                <p>👤 คุณ: ${q.displayName}</p>
                                <p>🔮 ประเภท: ${q.type === 'phone' ? `โทรนัดหมาย (${q.scheduledDate} เวลา ${q.scheduledTime})` : 'พิมพ์ตอบคิวปกติ'}</p>
                                <p>สถานะ: ${q.status === 'waiting' ? '⏳ รอคิว' : q.status === 'called' ? '📢 เรียกคิวแล้ว' : '✅ สำเร็จ'}</p>
                            </div>
                        </div>
                    </div>`;
            });
            queueList.innerHTML = html;
        }
    </script>
</body>
</html>
